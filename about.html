<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 | 木木非</title>
    <style>
        /* 核心样式：打造高级感 */
        :root {
            --primary-color: #6366f1;
            --accent-color: #a855f7;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 背景流光动画 */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary-color);
            filter: blur(100px);
            border-radius: 50%;
            top: 10%;
            left: 10%;
            z-index: -1;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* 玻璃面板 */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        nav {
            margin-bottom: 2rem;
        }

        nav a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .highlight {
            color: #f43f5e;
            font-weight: bold;
            font-style: italic;
        }

        .tag {
            background: rgba(99, 102, 241, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        p {
            line-height: 1.8;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .dream {
            margin-top: 2rem;
            padding: 1rem;
            border-left: 4px solid var(--accent-color);
            background: rgba(168, 85, 247, 0.1);
            text-align: left;
            font-size: 0.95rem;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <nav>
            <a href="/">首页</a>
            <a href="about.html" style="color: white; border-bottom: 2px solid var(--primary-color);">关于我</a>
        </nav>

        <div class="tag">Cloudflare 开发者</div>
        <h1>关于我</h1>
        
        <p>我是 <span style="color: white; font-weight: bold;">木木非</span></p>
        <p>来自 <span style="color: #60a5fa;">浙江财经大学 (ZUFE)</span></p>

        <div class="dream">
            “清深光宗耀祖，软微大雪深埋”
        </div>

        <div class="footer">
            Built with Passion & Cloudflare Pages
        </div>
    </div>

</body>
</html>
