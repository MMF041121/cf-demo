<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木木非的个人空间</title>
    <style>
        /* 全局定义：与 About 页保持色系一致但更具动感 */
        :root {
            --primary-bg: #030712;
            --accent-glow: #6366f1;
            --secondary-glow: #f43f5e;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-bg);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            overflow: hidden; /* 保持首页精致，不滚动 */
        }

        /* 动态背景光球 */
        .background-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate;
        }
        .blob-1 { background: var(--accent-glow); top: -10%; left: -10%; }
        .blob-2 { background: var(--secondary-glow); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 1rem;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        nav a:hover, nav a.active {
            color: white;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* 主体内容：英雄区 */
        main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
            margin-top: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 按钮设计 */
        .cta-button {
            margin-top: 40px;
            padding: 15px 40px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-glow);
            background: var(--accent-glow);
            color: white;
        }

        /* 底部信息 */
        .footer-note {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }

    </style>
</head>
<body>

    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <nav>
        <a href="/" class="active">首页</a>
        <a href="about.html">关于我</a>
    </nav>

    <main>
        <p class="hero-subtitle">Hello, I am</p>
        <h1 class="hero-title">木木非</h1>
        <p style="margin-top:10px; color:rgba(255,255,255,0.5)">高级无敌牛逼的网页实验室</p>
        
        <a href="about.html" class="cta-button">了解更多</a>

        <div class="footer-note">
            浙财学子 | 梦想：清深光宗耀祖，软微大雪深埋
        </div>
    </main>

</body>
</html>
