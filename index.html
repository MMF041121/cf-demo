<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木木非的个人空间 | 高级网页实验室</title>
    <style>
        /* 全局定义：深邃宇宙与霓虹光效 */
        :root {
            --primary-bg: #030712;
            --accent-glow: #6366f1;
            --secondary-glow: #f43f5e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--primary-bg);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
            /* 调整为允许垂直滚动，防止项目变多时手机端显示不全 */
            overflow-x: hidden; 
            overflow-y: auto; 
        }

        /* 动态背景光球 */
        .background-blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            max-width: 600px;
            max-height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.35;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { background: var(--accent-glow); top: -20%; left: -10%; }
        .blob-2 { background: var(--secondary-glow); bottom: -20%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(150px, 80px) scale(1.2); }
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            background: linear-gradient(to bottom, rgba(3,7,18,0.8), transparent);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        nav a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        nav a:hover, nav a.active {
            color: white;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* 主体内容布局 */
        main {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 80px 20px; /* 增加上下内边距，适应多项目情况 */
            box-sizing: border-box;
            position: relative;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: clamp(3.5rem, 8vw, 6.5rem);
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 30%, rgba(255,255,255,0.3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            letter-spacing: -2px;
        }

        .lab-tag {
            margin-top: 15px;
            display: inline-block;
            padding: 6px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        /* 新增：项目卡片容器 */
        .projects-container {
            display: flex;
            gap: 25px;
            margin-top: 50px;
            flex-wrap: wrap; /* 空间不够时自动换行 */
            justify-content: center;
            width: 100%;
            max-width: 900px; /* 控制最大宽度，使得两个卡片在电脑上正好并排居中 */
        }

        /* 修改：精选项目卡片 */
        .featured-project {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 25px 30px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 380px; /* 调整宽度，适合并排显示 */
            box-sizing: border-box;
            position: relative;
        }

        .featured-project:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.3);
        }

        /* 单独给招生解析项目加一个悬浮红光特效，区分色彩 */
        .featured-project.data-insight:hover {
            border-color: rgba(244, 63, 94, 0.5);
            box-shadow: 0 15px 30px -10px rgba(244, 63, 94, 0.3);
        }

        .project-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #818cf8;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* 红色系徽章样式 */
        .project-badge.red {
            color: #fb7185;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .project-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin: 0;
            line-height: 1.5;
        }

        /* 底部信息 */
        .footer-note {
            margin-top: 60px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }
        
        .footer-note span {
            color: rgba(255,255,255,0.6);
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <nav>
        <a href="/" class="active">首页</a>
        <a href="about.html">关于我</a>
    </nav>

    <main>
        <p class="hero-subtitle">Welcome to</p>
        <h1 class="hero-title">木木非</h1>
        <div class="lab-tag">✨ 高级无敌牛逼的网页实验室</div>
        
        <div class="projects-container">
            
            <!-- 项目一：招生解析 (新项目) -->
            <!-- 将来如果你有更多学校，可以把这里当做一个系列入口，或者继续复制这样的卡片 -->
            <a href="西安交通大学-broll-v2.html" class="featured-project data-insight">
                <span class="project-badge red">数据洞察 / Data Insights</span>
                <h3 class="project-title">宁夏招生解析 | 西安交通大学</h3>
                <p class="project-desc">国内高校宁夏招生专业历年录取数据多维可视化与深度剖析</p>
            </a>

            <!-- 项目二：全美高校星图 (原项目) -->
            <a href="us_map.html" class="featured-project">
                <span class="project-badge">地理可视化 / Geo-Data</span>
                <h3 class="project-title">Atlas.Edu | 全美百强高校星图</h3>
                <p class="project-desc">基于 Leaflet 的交互式地理数据可视化与高校分布系统</p>
            </a>

        </div>

        <div class="footer-note">
            浙财学子 | 梦想：<span>清深</span>光宗耀祖，<span>软微</span>大雪深埋
        </div>
    </main>

</body>
</html>
